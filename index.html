<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi's Colorful Candy World</title>
    <style>
        :root {
            --bg-orange: #ff9800;
            --soft-white: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-orange);
        }

        /* 3D 背景容器 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #ffcc80 0%, #ff9800 100%);
        }

        /* 主容器 - 響應式寬度 */
        .main-content {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* 頂部標題 */
        .banner {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            color: #e65100;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            z-index: 10;
        }

        /* 自我介紹卡片 */
        .info-panel {
            background: var(--soft-white);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            display: flex;
            flex-direction: column; /* 手機預設垂直 */
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
            box-sizing: border-box;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .info-text { text-align: center; }
        .info-text h3 { color: #d84315; margin: 0; font-size: 1.5rem; }
        .info-text p { color: #5d4037; margin: 10px 0 0 0; line-height: 1.5; }

        /* 按鈕選單 */
        .nav-vertical {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 280px;
        }

        .candy-btn {
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 rgba(0,0,0,0.1), inset 0 -5px 8px rgba(0,0,0,0.1), inset 0 5px 10px rgba(255,255,255,0.6);
        }

        /* 按鈕顏色變體 */
        .btn-strawberry { background: #ff7eb9; }
        .btn-soda { background: #4ecdc4; }
        .btn-mint { background: #95e1d3; }
        .btn-grape { background: #a29bfe; }

        .candy-btn:hover { transform: scale(1.05) translateY(-3px); filter: brightness(1.1); }
        .candy-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 電腦版 (螢幕大於 600px) */
        @media (min-width: 600px) {
            .info-panel { flex-direction: row; text-align: left; }
            .info-text { text-align: left; }
            .avatar { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="main-content">
        <div class="banner">🍬 Mochi's Sweet World 🍬</div>

        <div class="info-panel">
            <img class="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Mochi&backgroundColor=ffb74d" alt="avatar">
            <div class="info-text">
                <h3>Hi, 我是 Mochi! 🧡</h3>
                <p>20歲，喜歡動漫、貓咪與數位創作。<br>這是一個可以隨意探索的糖果盒子！</p>
            </div>
        </div>

        <nav class="nav-vertical">
            <button class="candy-btn btn-strawberry">關於我</button>
            <button class="candy-btn btn-soda">日常網誌</button>
            <button class="candy-btn btn-mint">收藏精品</button>
            <button class="candy-btn btn-grape">留言給我</button>
        </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 解決手機螢幕模糊問題
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const candies = [];
        const colors = [0xff7eb9, 0x4ecdc4, 0x95e1d3, 0xa29bfe, 0xffe66d, 0xffa726];

        for (let i = 0; i < 40; i++) {
            const type = Math.floor(Math.random() * 4);
            let geo;
            if(type === 0) geo = new THREE.SphereGeometry(0.3, 20, 20);
            else if(type === 1) geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            else if(type === 2) geo = new THREE.TorusGeometry(0.2, 0.1, 10, 30);
            else geo = new THREE.IcosahedronGeometry(0.3, 0);

            const mat = new THREE.MeshPhongMaterial({ 
                color: colors[Math.floor(Math.random() * colors.length)],
                shininess: 100 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-1)*8);
            scene.add(mesh);
            candies.push({ mesh, rot: Math.random()*0.02, off: Math.random()*Math.PI*2 });
        }

        camera.position.z = 6;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            candies.forEach(c => {
                c.mesh.rotation.x += c.rot;
                c.mesh.rotation.y += c.rot;
                c.mesh.position.y += Math.sin(time + c.off) * 0.003;
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
